name: CI - Lint & Syntax Check

on:
  push:
    branches: [main, 'devin/**']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check - JS files
        run: |
          node -c index_wsp.js
          node -c db_wsp.js
          node -c config_wsp.js
          node -c panel_server.js
          echo "All JS files pass syntax check"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check - Python files
        run: |
          python -m py_compile bot.py
          python -m py_compile wsp_bridge.py
          echo "All Python files pass syntax check"

      - name: Check required files exist
        run: |
          test -f panel.html || (echo "panel.html missing!" && exit 1)
          test -f manifest.json || (echo "manifest.json missing!" && exit 1)
          test -f sw.js || (echo "sw.js missing!" && exit 1)
          test -f start.sh || (echo "start.sh missing!" && exit 1)
          echo "All required files present"

  docker:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t botspam:test .

      - name: Verify Docker image
        run: docker images botspam:test
